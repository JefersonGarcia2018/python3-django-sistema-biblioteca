<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biblioteca{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="font-bold text-xl">📚 Sistema Biblioteca</a>
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-blue-100 mr-2 border-r border-blue-400 pr-4">Olá, {{ user.first_name|default:user.email }}</span>
                    <a href="{% url 'lista_livros' %}" class="hover:text-blue-200 transition font-medium">Acervo</a>
                    <a href="{% url 'novo_livro' %}"
                        class="bg-blue-800 px-4 py-2 rounded-lg hover:bg-blue-700 transition font-medium">Novo Livro</a>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-red-500 px-4 py-1.5 rounded-lg hover:bg-red-600 transition font-medium">Sair</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-blue-200 transition font-medium">Entrar</a>
                    <a href="{% url 'cadastro' %}" class="bg-green-500 px-4 py-1.5 rounded-lg hover:bg-green-600 transition font-medium">Cadastrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-6 text-sm {% if message.tags == 'success' %}text-green-800 bg-green-100 border border-green-300{% else %}text-blue-800 bg-blue-100 border border-blue-300{% endif %} rounded-lg shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>

</html>
