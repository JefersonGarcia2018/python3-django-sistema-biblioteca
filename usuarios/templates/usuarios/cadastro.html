{% extends 'base.html' %}

{% block title %}Criar Conta - Sistema Biblioteca{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200 mt-10">
    <h2 class="text-3xl font-extrabold text-center text-green-700 mb-6">Criar Conta</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition duration-200 mt-4 shadow-md">
            Registrar-se
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-600 border-t pt-4">
        Já possui uma conta? <br>
        <a href="{% url 'login' %}" class="text-blue-600 font-semibold hover:underline">Faça login aqui</a>
    </div>
</div>
{% endblock %}
