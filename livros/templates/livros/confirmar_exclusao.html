{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border-t-4 border-red-500">
    <h2 class="text-xl font-bold mb-4">Tem certeza?</h2>
    <p class="text-gray-600 mb-6">Você está prestes a excluir permanentemente o livro: <span class="font-bold">"{{ livro.titulo }}"</span>.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex space-x-4">
            <button type="submit" class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">Confirmar Exclusão</button>
            <a href="{% url 'lista_livros' %}" class="flex-1 text-center bg-gray-200 py-2 rounded-lg hover:bg-gray-300">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
