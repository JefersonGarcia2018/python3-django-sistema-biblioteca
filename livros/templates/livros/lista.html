{% extends 'base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-6 text-gray-800">Livros Cadastrados</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for livro in livros %}
    <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
        <h3 class="text-xl font-semibold">{{ livro.titulo }}</h3>
        <p class="text-gray-600 italic">Por: {{ livro.autor.nome }}</p>
        <div class="mt-4 flex space-x-2">
            <span class="text-xs font-mono bg-gray-200 px-2 py-1 rounded">ISBN: {{ livro.isbn }}</span>
        </div>
        <div class="mt-6 flex justify-between items-center border-t pt-4">
            <a href="{% url 'editar_livro' livro.pk %}" class="text-blue-600 hover:text-blue-800 font-medium">Editar</a>
            <a href="{% url 'excluir_livro' livro.pk %}" class="text-red-500 hover:text-red-700 text-sm">Excluir</a>
        </div>
    </div>
    {% empty %}
    <p class="text-gray-500">Nenhum livro cadastrado ainda.</p>
    {% endfor %}
</div>
{% endblock %}
